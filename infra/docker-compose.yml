services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arewegoing
    ports:
    - "55432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arewegoing
      SECRET_KEY: "dev-secret-change-this"
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      - db

volumes:
  postgres_data: